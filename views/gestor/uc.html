{% extends "../base.html" %}

{% block content %}
<div class="container">
  <div class="card" style="margin-bottom:2rem;">
    <h3>Registar Unidade Curricular</h3>
    <form method="POST" action="/gestor/uc" class="modern-form">
      <input type="text" name="codigo" placeholder="Código (Ex: MAT101)" required>
      <input type="text" name="nome" placeholder="Nome da Disciplina" required>
      <textarea name="descricao" placeholder="Ementa/Descrição"></textarea>
      <button type="submit" class="btn btn-primary">Adicionar UC</button>
    </form>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Nome</th>
          <th>Descrição</th>
        </tr>
      </thead>
      <tbody>
        {% for u in ucs %}
        <tr>
          <td><strong>{{ u.codigo }}</strong></td>
          <td>{{ u.nome }}</td>
          <td>{{ u.descricao }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
