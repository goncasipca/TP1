{% extends "base.html" %}

{% block content %}
<div class="container" style="display:flex; justify-content:center; align-items:center; min-height:70vh;">
  <div class="card" style="width:100%; max-width:400px;">

    <div style="text-align:center; margin-bottom:2rem;">
      <h2 style="margin-bottom:0.5rem;">Bem-vindo</h2>
      <p style="font-size:0.9rem; color:var(--text-secondary);">Introduza os seus dados para aceder ao sistema</p>
    </div>

    {% if erro %}
      <div style="background:#fee2e2; color:#991b1b; padding:0.75rem; border-radius:var(--radius-sm); margin-bottom:1.5rem; font-size:0.9rem; text-align:center; border:1px solid #fecaca;">
        {{ erro }}
      </div>
    {% endif %}

    <form method="POST" action="/login" class="modern-form">
      <div class="form-group">
        <label>Utilizador</label>
        <input type="text" name="username" placeholder="Seu username" required autofocus>
      </div>
      <div class="form-group">
        <label>Palavra-passe</label>
        <input type="password" name="password" placeholder="Sua password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">
        Entrar no Portal
      </button>
    </form>

    <div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border); text-align:center;">
      <p style="font-size:0.85rem; color:var(--text-secondary);">
        Problemas no acesso? Contacte os serviços académicos.
      </p>
    </div>

  </div>
</div>
{% endblock %}
